services:
  db2:
    image: icr.io/db2_community/db2:11.5.9.0
    container_name: db2
    privileged: true

    ports:
      - "50000:50000"

    environment:
      LICENSE: accept
      DB2INST1_PASSWORD: Password123
      DBNAME: POLAR

    volumes:
      - db2_data:/database
      - ./db2_backup:/database/backup

    healthcheck:
      test: ["CMD-SHELL", "su - db2inst1 -c 'db2 connect to POLAR user db2inst1 using Password123 >/dev/null 2>&1'"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 300s

  web:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: polar_app_dev

    ports:
      - "8080:8080"

    depends_on:
      db2:
        condition: service_healthy

    environment:
      ASPNETCORE_ENVIRONMENT: Development
      GEMINI_API_KEY: ${GEMINI_API_KEY}

    volumes:
      - ./uploads:/app/wwwroot/uploads

volumes:
  db2_data: