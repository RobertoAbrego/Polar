services:

  db2:
    image: ibmcom/db2
    container_name: db2
    privileged: true
    ports:
      - "50000:50000"
    environment:
      LICENSE: accept
      DB2INST1_PASSWORD: Password123
      DBNAME: POLAR
    volumes:
      - db2_data:/database
      - ./db2_backup:/database/backup

  web:
    image: mcr.microsoft.com/dotnet/sdk:8.0
    container_name: polar_app_dev
    working_dir: /app

    ports:
      - "8080:8080"

    depends_on:
      - db2

    volumes:
      - .:/app


    command: dotnet watch run --urls=http://0.0.0.0:8080

    environment:
      ASPNETCORE_ENVIRONMENT: Development
      DB2_HOST: db2
      DB2_PORT: 50000
      DB2_DB: POLAR
      DB2_USER: db2inst1
      DB2_PASSWORD: Password123

volumes:
  db2_data: